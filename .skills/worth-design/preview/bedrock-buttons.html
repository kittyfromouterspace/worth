<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_base.css"></head>
<body class="theme-bedrock">
<div class="card">
  <div class="label" style="margin-bottom:12px">Bedrock buttons</div>
  <div class="row" style="gap:12px;align-items:flex-start">
    <div class="stack">
      <button class="btn-molten">Send</button>
      <div style="font-family:'JetBrains Mono';font-size:10px;color:#8A8A8F">btn-molten · primary</div>
    </div>
    <div class="stack">
      <button style="background:#2A2A2E;color:#E8E8EA;border:1px solid #3A3A3F;border-radius:2px;padding:4px 12px;font-size:11px;font-family:'Inter';font-weight:500;cursor:pointer">Cancel</button>
      <div style="font-family:'JetBrains Mono';font-size:10px;color:#8A8A8F">secondary</div>
    </div>
    <div class="stack">
      <button style="background:transparent;color:#FF3B2F;border:1px solid rgba(255,59,47,.3);border-radius:2px;padding:4px 12px;font-size:11px;font-family:'Inter';font-weight:500;cursor:pointer">Stop</button>
      <div style="font-family:'JetBrains Mono';font-size:10px;color:#8A8A8F">destructive ghost</div>
    </div>
    <div class="stack">
      <button style="background:transparent;color:#8A8A8F;border:none;padding:4px 8px;font-size:11px;font-family:'Inter';cursor:pointer">query</button>
      <div style="font-family:'JetBrains Mono';font-size:10px;color:#8A8A8F">link / text</div>
    </div>
  </div>
</div>
</body></html>
