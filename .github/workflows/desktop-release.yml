name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

permissions:
  contents: write

env:
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.0"
  RUST_VERSION: "stable"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
          - platform: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- System dependencies (Linux) ---
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # --- Elixir/OTP ---
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # --- Rust ---
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rel/desktop/src-tauri
          key: ${{ matrix.platform }}

      # --- Elixir deps cache ---
      - name: Elixir deps cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ matrix.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ matrix.os }}-

      # --- Build OTP Release ---
      - name: Build OTP release
        env:
          MIX_ENV: prod
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only prod
          mix assets.deploy
          mix release desktop --overwrite --path rel/desktop/src-tauri/release

      # --- Build Tauri ---
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: rel/desktop/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      # --- Inject OTP release into bundle ---
      - name: Inject OTP release into macOS bundle
        if: startsWith(matrix.os, 'macos')
        run: |
          APP_DIR=$(find rel/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos -name '*.app' -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            cp -a rel/desktop/src-tauri/release "$APP_DIR/Contents/Resources/release"
          fi

      - name: Inject OTP release into Linux bundle
        if: matrix.os == 'ubuntu-22.04'
        run: |
          APPDIR=$(find rel/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name '*.AppDir' -type d 2>/dev/null | head -1)
          if [ -n "$APPDIR" ]; then
            cp -a rel/desktop/src-tauri/release "$APPDIR/usr/bin/release"
          fi

      # --- Upload artifacts ---
      - name: Upload macOS artifacts
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: worth-${{ matrix.platform }}
          path: |
            rel/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            rel/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: worth-${{ matrix.platform }}
          path: |
            rel/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            rel/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ inputs.draft || true }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
