<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_base.css"></head>
<body class="theme-bedrock">
<div class="card">
  <div class="label" style="margin-bottom:12px">Input states · Bedrock</div>
  <div class="stack" style="gap:10px;max-width:520px">
    <div style="display:flex;align-items:center;gap:10px;background:#0B0B0D;border:1px solid #3A3A3F;border-radius:2px;padding:8px 12px;font-family:'JetBrains Mono';font-size:13px">
      <span style="color:#8A8A8F">code ></span>
      <span style="color:#5A5A5F">Type a message or /command...</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:#0B0B0D;border:1px solid #FF3B2F;border-radius:2px;padding:8px 12px;font-family:'JetBrains Mono';font-size:13px;box-shadow:0 0 0 1px rgba(255,59,47,.3)">
      <span style="color:#8A8A8F">code ></span>
      <span style="color:#E8E8EA">write a test for auth.ex<span style="display:inline-block;width:7px;height:14px;background:#E8E8EA;vertical-align:middle;margin-left:1px;animation:cur 1s steps(1) infinite"></span></span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:#1A1A1E;border:1px solid #3A3A3F;border-radius:2px;padding:8px 12px;font-family:'JetBrains Mono';font-size:13px">
      <span style="color:#5A5A5F">code ></span>
      <span style="color:#5A5A5F">Waiting for response...</span>
      <span style="margin-left:auto;color:#F0B341;font-size:16px" class="spinner"><svg viewBox="0 0 64 64"><polygon points="4,10 16,10 28,46 18,52"/><polygon points="22,10 30,10 32,48 28,46"/><polygon points="34,10 42,10 36,46 32,48"/><polygon points="48,10 60,10 46,52 36,46"/></svg></span>
    </div>
  </div>
  <div style="margin-top:12px;font-family:'JetBrains Mono';font-size:10px;color:#8A8A8F">idle · focused (molten ring) · disabled-waiting</div>
</div>
<style>@keyframes cur{50%{opacity:0}}</style>
</body></html>
