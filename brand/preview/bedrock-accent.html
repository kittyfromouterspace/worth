<!doctype html><html><head><meta charset="utf-8"><title>Bedrock — Molten</title><link rel="stylesheet" href="_base.css"></head>
<body class="theme-bedrock">
<div class="card">
  <div class="label" style="margin-bottom:12px">Bedrock · action + semantic</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FF3B2F"></div><div class="name">Molten</div><div class="hex">#FF3B2F</div></div>
    <div class="swatch"><div class="chip" style="background:#FF6A3D"></div><div class="name">Heat Glow</div><div class="hex">#FF6A3D · hover</div></div>
    <div class="swatch"><div class="chip" style="background:#CC2E24"></div><div class="name">Press</div><div class="hex">#CC2E24</div></div>
    <div class="swatch"><div class="chip" style="background:#7EC87E"></div><div class="name">Ore Green</div><div class="hex">#7EC87E · success</div></div>
    <div class="swatch"><div class="chip" style="background:#F0B341"></div><div class="name">Amber</div><div class="hex">#F0B341 · warning</div></div>
  </div>
  <div style="margin-top:14px;font-size:11px;color:#8A8A8F;font-family:'Inter',sans-serif;max-width:640px">
    Budget: <span style="color:#E8E8EA">1–2 molten elements per screen, maximum.</span> Send, stop, active error. If everything is molten, nothing is.
  </div>
</div>
