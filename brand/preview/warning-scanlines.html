<!doctype html><html><head><meta charset="utf-8"><title>Warning strip + scanlines</title><link rel="stylesheet" href="_base.css"></head>
<body class="theme-fifth-element">
<div class="card">
  <div class="label" style="margin-bottom:12px;color:#FF8C00">Hazard strip + CRT overlay</div>
  <div style="border:1px solid #3A3A3F;background:#0a0a0a;position:relative;overflow:hidden;max-width:520px">
    <div class="warning-strip"></div>
    <div style="padding:14px;font-family:'Fira Code';font-size:12px;color:#00FF41;text-shadow:0 0 5px rgba(0,255,65,.5)">
      &gt; navigator.online<br>
      &gt; sync_engine ready<br>
      &gt; <span style="color:#FDB813">warn: 3 approvals pending</span>
    </div>
    <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.06) 2px,rgba(0,255,65,.06) 4px)"></div>
  </div>
  <div style="margin-top:10px;font-family:'Fira Code';font-size:11px;color:#00CC33">4px hazard strip (−45° repeating gradient · yellow on panel) · 2/4px green CRT lines over entire UI</div>
</div>
</body></html>
