<!doctype html><html><head><meta charset="utf-8"><title>Emergency button</title><link rel="stylesheet" href="_base.css"></head>
<body class="theme-fifth-element">
<div class="card">
  <div class="label" style="margin-bottom:16px;color:#FF8C00">Emergency button · Fifth Element send</div>
  <div class="row" style="gap:24px;align-items:center">
    <button class="emergency-button">SEND</button>
    <button style="background:#2C2C2C;border:1px solid rgba(255,140,0,.5);color:#C0C0C0;padding:8px 16px;font-family:'Orbitron';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;border-radius:6px;cursor:pointer">Cancel</button>
    <button style="background:transparent;border:2px solid #FF3333;color:#FF3333;padding:8px 16px;font-family:'Orbitron';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;border-radius:6px;cursor:pointer">■ STOP</button>
  </div>
  <div style="margin-top:16px;font-family:'Fira Code';font-size:11px;color:#00CC33">3px orange border · 8px radius · 4px red-cast hard shadow · inset top highlight · press compresses to 1px offset</div>
</div>
</body></html>
